  CalendarEvent:
    properties:
      id:
        type: string
        example: er23321
        description: The unique id of the resource in Hosthub system.
      object:
        type: string
        example: CalendarEvent
        description: The object type of this resource. Here it will be CalendarEvent.
      type:
        type: string
        example: CalendarEventBooking
        description: The type of calendar event this is.
      master_calendar_event_id:
        type: integer
        example: ew1221a
        description: The id of the parent calendar event if one exists. This will be filled for satellite calendar events. For example when a booking in a house also creates calendar events for the rooms that are rented also individually.
      created:
        type: integer
        example: 1254885548
        description: Time at which the object was created on Hosthub. Measured in seconds since the Unix epoch.
      updated:
        type: integer
        example: 1254888548
        description: Time at which the object was updated. Measured in seconds since the Unix epoch.
      created_on_channel:
        type: integer
        example: 1254885548
        description: Time at which the object was initially created on the source booking platform. Measured in seconds since the Unix epoch.
      cancelled_at:
        type: integer
        example: 1254885548
        description: Time at which the object was cancelled. Measured in seconds since the Unix epoch.
      date_from:
        type: string
        format: date
        example: "2019-03-01"
        description: The date of the check-in (in cases of a booking) or the first day that the rental block will start (cases of hold events).
      date_to:
        type: string
        format: date
        example: "2019-03-04"
        description: The date of the checkout (in cases of a booking) or the day that the rental block will finish. This always means that the house will be bookable for this day.
      check_in_time:
        type: string
        format: time
        example: "13:00"
        description: The time of the check-in. If the object is not a booking, it will be null.
      check_out_time:
        type: string
        format: time
        example: "11:00"
        description: The time of the check-out. If the object is not a booking, it will be null.
      nights:
        type: integer
        example: 3
        description: Number of nights this hold/booking is taking.
      rental:
        properties:
          id:
            type: string
            example: oku721
            description: The unique id of the Rental in Hosthub system.
          object:
            type: string
            example: Rental
            description: The object type of this resource. Here it will be Rental.
          name:
            type: string
            example: Ampelos Villa
            description: The name of rental stored in Hosthub.
          url:
            type: string
            example: /api/2019-03-01/rental/oku721
            description: A url that can be used to retrieve this rental from the API.
      is_visible:
        type: boolean
        example: true
        description: If this hold event is visible or not. For now only visible events are returned via the API.
      title:
        type: string
        example: Petros Ziogas
        description: Title of this Calendar Event. Depending on the type, this can be a different data element. For bookings, most of the times it will be the guest name.
      guest_name:
        type: string
        example: Petros Ziogas
        description: The name of the guest if available.
      location:
        type: string
        example: Athens
        description: The location if available. Most channels don't provide this data.
      guest_number:
        type: integer
        example: 4
        description: The total number of guests (adults+children).
      guest_adults:
        type: integer
        example: 3
        description: The number of adults, if available.
      guest_children:
        type: integer
        example: 1
        description: The number of children, if available.
      guest_email:
        type: string
        example: petros.travel@fly.com
        description: The guest email, if provided. A lot of times this will be a forward email provided by the channel.
      guest_phone:
        type: string
        example: '+30998985891'
        description: The phone number of the guest, if available.
      guest_city:
        type: string
        example: 'London'
        description: The city of the guest, if available.
      guest_address:
        type: string
        example: '221B Baker Street'
        description: The address of the guest, if available.
      guest_zip_code:
        type: string
        example: 'NW1 6XE'
        description: The zip code of the guest, if available.
      guest_country_code:
        type: string
        example: 'GB'
        description: The country code of the guest, if available.
      guest_remarks:
        type: string
        example: 'This customer requires the receipt of the stay.'
        description: Remarks of the guest, if available.
      identification_type:
        type: ['string', 'null']
        enum:
          - naid
          - pano
          - vatn
        example: 'naid'
        description: National ID (naid), Passport number (pano), VAT number (vatn)
      identification_number:
        type: string
        example: 'ABC123456'
        description: Depending on the identification_type provide the appropriate number.
      meal_plan:
        type: string
        example: 'Veggie'
        description: Meal plan preference, if available.
      room_remarks:
        type: string
        example: 'Booked rate: Non Refundable Rate'
        description: Remarks for the room, if available.
      smoking_preference:
        type: boolean
        example: false
        description: Smoking preference, if available.
      booking_value:
        $ref: '#/definitions/Money'
        description: The cost of the bookings nights not including any extra fees. Most of the times this equals to the cost per night * the total nights. If available.
      cleaning_fee:
        $ref: '#/definitions/Money'
        description: The cost of the cleaning that was charged for the booking. If available.
      other_fees:
        $ref: '#/definitions/Money'
        description: Other fees not included in more specific fees. If available.
      service_fee_host:
        $ref: '#/definitions/Money'
        description: The fees that the host paid. Also known as the channel commision that the host pays. If available.
      total_payout:
        $ref: '#/definitions/Money'
        description: The money the host will get. Roughly this equals [guest_paid]-[taxes]-[service_fee_guest]-[service_fee_host]. If available.
      service_fee_guest:
        $ref: '#/definitions/Money'
        description: The fee the guest paid. For some channels this is completely hidden from the host (Airbnb). If available.
      taxes:
        $ref: '#/definitions/Money'
        description: Taxes that were added to the booking. Depending on the country and channel, this can be always null. If available.
      total_reservation_price:
        $ref: '#/definitions/Money'
        description: Sum of the price of each booking contained in the same reservation. If available.
      guest_paid:
        $ref: '#/definitions/Money'
        description: What the guest paid after all fees. For some channels this is completely hidden from the host (Airbnb). If available.
      payment_charges:
        $ref: '#/definitions/Money'
        description: What the host was charged for the channel facilitating the payment process. If available.
      manager_fee:
        $ref: '#/definitions/Money'
        description: The fee that the rental manager charges for managing the booking, based on the manager fee formula set by the rental manager. If available.
      owner_payout:
        $ref: '#/definitions/Money'
        description: The money that the rental owner will get, based on the payout formula set by the rental manager. If available.
      notes:
        type: string
        example: Don't forget that the guest likes tea. Make sure he has some waiting.
        description: Any notes added to the Calendar Event. Host can add notes via Hosthub interface.
      reservation_id:
        type: string
        example: AB67782136778
        description: The external id of the reservation given by the channel. If available. Notice that this is not unique by design. A user can have a calendar event with reservation id 999 from booking.com and another one with reservation id 999 from Airbnb. The unique property you can use is the one called "id".
      created_by:
        $ref: '#/definitions/UserShort'
        description: The user that created this CalendarEvent. Relevant only for Hold events and Offline Bookings that a user can create via the Hosthub app.
      source:
        $ref: '#/definitions/Source'
      hold_reason:
        type: string
        example: Deep cleaning
        description: A text provided by the user when she creates a manual Hold.
      url:
        type: string
        example: /api/2019-03-01/calendar-events/er23321
        description: A url that can be used to retrieve this Calendar Event from the API.
